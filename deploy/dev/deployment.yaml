apiVersion: apps/v1
kind: Deployment
metadata:
  name: servicebus-ingester-dotnet
  namespace: experiment
  labels:
    app: servicebus-ingester-dotnet
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 100%
      maxSurge: 100%
  replicas: 2
  selector:
    matchLabels:
      app: servicebus-ingester-dotnet
  template:
    metadata:
      labels:
        app: servicebus-ingester-dotnet
        app.kubernetes.io/name: servicebus-ingester-dotnet
        app.kubernetes.io/component: server
        log-source: dcsp-backend
        team: platform
    spec:
      terminationGracePeriodSeconds: 30
      nodeSelector:
        pool_type: general
      tolerations:
        - key: "kubernetes.azure.com/scalesetpriority"
          operator: "Equal"
          value: "spot"
          effect: "NoSchedule"
      containers:
        - name: ingester
          image: acrvcedcsp.azurecr.io/experiment/ingestion/servicebus-ingester-dotnet:20260319.112646
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: global-env-config
            - configMapRef:
                name: servicebus-ingester-dotnet-config
            - secretRef:
                name: servicebus-ingester-dotnet-kv-experiment-config
          ports:
            - name: health
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 768m
              memory: 768Mi
            requests:
              cpu: 50m
              memory: 384Mi
